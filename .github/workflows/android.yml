name: Android CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare unsigned release signing properties
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .local/signing | Out-Null
          @"
          BTF_RELEASE_STORE_FILE=.local/signing/app-release.jks
          BTF_RELEASE_STORE_PASSWORD=dummy
          BTF_RELEASE_KEY_ALIAS=dummy
          BTF_RELEASE_KEY_PASSWORD=dummy
          "@ | Set-Content signing.properties

      - name: Run tests, lint and builds
        shell: pwsh
        run: ./gradlew.bat clean testDebugUnitTest lintDebug lintRelease assembleDebug assembleRelease --console=plain --no-daemon

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-verification-artifacts
          path: |
            app/build/reports/**
            app/build/test-results/**
            app/build/outputs/apk/**
